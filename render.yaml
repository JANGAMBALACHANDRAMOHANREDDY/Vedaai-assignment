services:
  - type: web
    name: assessment-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: worker
    name: assessment-worker
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:worker
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
