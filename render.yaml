# Render Blueprint — backend only (SIMPLE_DEV = no MongoDB/Redis/worker)
# https://dashboard.render.com/select-repo?type=blueprint
services:
  - type: web
    name: vedaai-api
    runtime: node
    rootDir: backend
    buildCommand: npm install --ignore-scripts && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: SIMPLE_DEV
        value: "true"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
        optional: true
